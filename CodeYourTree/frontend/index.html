<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
        integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
        integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
        integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/main.js"></script>
</head>

<body>
    <header id="top-nav" class="dashboard-header d-flex justify-content-between align-items-center p-3 mb-4">
        <div class="user-info">
            <span>
                Welcome back, <strong id="display-username">...</strong>!
            </span>
        </div>
    </header>
    <div class="container mt-5">
        <div class="row">
            <!-- Left column for info and buttons here-->
            <div class="col-lg-5">
                <div class="card p-4 border-0 custom-card">
                    <h2 id="tree-rank">Seedling</h2>
                    <p>Streak: <span id="streak-count">1 </span>Day</p>
                    <button id="logBtn" class="btn btn-success w-100">Save today's code</button>
                    <div class="mt-4 pt-4 heatmap-container">
                        <h6 class="heatmap-title">Contribution Graph </h6>
                        <div id="heatmap" class="heatmap-grid"></div>
                    </div>
                </div>
            </div>
            <!-- Telefondaysan alta geç ve aranda biraz boşluk bırak (mt-4),
             ama bilgisayar ekranındaysan yan yana geç, 7 birim yer kapla ve
              gereksiz üst boşluğu sıfırla (col-lg-7 ve mt-lg-0 -->
            <div class="col-lg-7 mt-4 mt-lg-0">
                <canvas id="treeCanvas"></canvas>
            </div>
        </div>
    </div>

</body>

</html>
